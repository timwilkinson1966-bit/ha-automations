blueprint:
  name: Motion Camera Popup (iPhone + Browser)
  description: Notify a mobile device and optionally open a camera popup on a browser when motion is detected.
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    camera_entity:
      name: Camera
      selector:
        entity:
          domain: camera

    notify_action:
      name: Notification action
      description: Choose your mobile app notification action from your system, for example notify.mobile_app_your_phone.
      selector:
        action: {}

    browser_id:
      name: Browser ID (optional)
      description: Browser Mod browser_id for tablet or dashboard; leave empty if not used.
      default: ""
      selector:
        text: {}

    message:
      name: Notification Message
      default: Motion detected!
      selector:
        text: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

variables:
  browser_target: !input browser_id
  camera_target: !input camera_entity
  notification_message: !input message

action:
  - choose:
      - conditions: []
        sequence:
          - variables:
              notify_sequence: !input notify_action
          - repeat:
              for_each: "{{ notify_sequence }}"
              sequence:
                - action: "{{ repeat.item.action }}"
                  data: >-
                    {{
                      dict(
                        repeat.item.data | default({}),
                        message=notification_message,
                        data=dict(
                          repeat.item.data.data | default({}),
                          entity_id=camera_target,
                          push=dict(
                            repeat.item.data.data.push | default({}),
                            category='camera'
                          )
                        )
                      )
                    }}
                  target: "{{ repeat.item.target if repeat.item.target is defined else omit }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ browser_target | trim != '' }}"
        sequence:
          - action: browser_mod.popup
            data:
              browser_id:
                - "{{ browser_target }}"
              title: Motion Detected
              timeout: 60000
              dismissable: true
              autoclose: false
              size: fullscreen
              content:
                type: picture-entity
                entity: "{{ camera_target }}"
                camera_view: live
                show_state: false
                show_name: true
