blueprint:
  name: Motion Camera Popup (iPhone + Browser)
  description: Notify iPhone and optionally open a camera popup on a browser when motion is detected.
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    camera_entity:
      name: Camera
      selector:
        entity:
          domain: camera

    ios_device:
      name: iOS Device
      description: Your iPhone or iPad notify target (e.g. notify.mobile_app_iphone_name)
      selector:
        text: {}

    browser_id:
      name: Browser ID (optional)
      description: Browser Mod browser_id for tablet or dashboard; leave empty if not used.
      default: ""
      selector:
        text: {}

    message:
      name: Notification Message
      default: Motion detected!
      selector:
        text: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

variables:
  ios_target: !input ios_device
  browser_target: !input browser_id
  camera_target: !input camera_entity

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ ios_target | trim != '' }}"
        sequence:
          - action: "{{ ios_target }}"
            data:
              message: !input message
              data:
                entity_id: "{{ camera_target }}"
                push:
                  category: camera

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ browser_target | trim != '' }}"
        sequence:
          - action: browser_mod.popup
            data:
              browser_id:
                - "{{ browser_target }}"
              title: Motion Detected
              timeout: 60000
              dismissable: true
              autoclose: false
              size: fullscreen
              content:
                type: picture-entity
                entity: "{{ camera_target }}"
                camera_view: live
                show_state: false
                show_name: true
